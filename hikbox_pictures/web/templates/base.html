<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | HikBox</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f5f2ea;
        --panel-bg: rgba(255, 252, 247, 0.9);
        --panel-border: rgba(74, 52, 35, 0.16);
        --text-main: #2d2118;
        --text-muted: #6b5646;
        --accent: #a5482f;
        --accent-soft: rgba(165, 72, 47, 0.12);
        --shadow: 0 18px 44px rgba(78, 56, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text-main);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 40%),
          linear-gradient(180deg, #e9dfcf 0%, var(--page-bg) 48%, #efe9dd 100%);
        font-family: "PingFang SC", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      code {
        font-family: "SFMono-Regular", "Consolas", monospace;
      }

      .page-shell {
        width: min(1240px, calc(100vw - 48px));
        margin: 0 auto;
      }

      .page-header {
        padding: 28px 0 18px;
      }

      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .page-main {
        padding-bottom: 40px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 3.4vw, 48px);
        line-height: 1.05;
      }

      .hero p {
        margin: 0;
        max-width: 720px;
        font-size: 15px;
        line-height: 1.6;
        color: var(--text-muted);
      }

      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .section-block {
        padding: 24px;
        margin-bottom: 24px;
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .section-head h2,
      .detail-head h1,
      .not-found h1 {
        margin: 0;
        font-size: clamp(22px, 2vw, 30px);
      }

      .section-head p,
      .detail-head p,
      .section-empty,
      .empty-state,
      .not-found-text {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .people-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      }

      .person-card {
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid rgba(74, 52, 35, 0.12);
        background: rgba(255, 255, 255, 0.82);
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .person-card:hover {
        transform: translateY(-2px);
        border-color: rgba(165, 72, 47, 0.28);
        box-shadow: 0 20px 32px rgba(78, 56, 40, 0.14);
      }

      .person-card a {
        display: block;
      }

      .person-card img,
      .sample-card img {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #eadfce;
      }

      .person-card-body,
      .sample-card-body {
        padding: 14px 14px 16px;
      }

      .person-card-title {
        margin: 0 0 8px;
        font-size: 17px;
        font-weight: 700;
      }

      .person-card-meta,
      .sample-card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        color: var(--text-muted);
      }

      .detail-shell {
        padding: 24px;
      }

      .detail-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: var(--accent);
      }

      .sample-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .sample-card {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(74, 52, 35, 0.12);
        background: rgba(255, 255, 255, 0.82);
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      .page-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 84px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(74, 52, 35, 0.12);
        background: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        color: var(--text-muted);
      }

      .page-chip.is-current {
        border-color: transparent;
        background: var(--accent);
        color: #fffaf6;
      }

      .empty-state,
      .not-found {
        padding: 26px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 1200px) {
        .sample-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 840px) {
        .page-shell {
          width: min(100vw - 24px, 1240px);
        }

        .detail-head {
          align-items: start;
          flex-direction: column;
        }

        .sample-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header class="page-shell page-header">
      <a class="brand-link" href="/people">HikBox 人物库</a>
    </header>
    <main class="page-shell page-main">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
