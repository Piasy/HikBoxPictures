<section class="media-viewer" data-viewer-index="0">
  <header class="viewer-toolbar">
    {% set initial = viewer_items[0] if viewer_items else None %}
    <button type="button" data-action="viewer-prev">上一张</button>
    <button type="button" data-action="viewer-next">下一张</button>
    <span class="viewer-status" data-viewer-status>
      {% if viewer_items %}1 / {{ viewer_items|length }}{% else %}无样例{% endif %}
    </span>
    <span class="viewer-current-label" data-viewer-current-label>{% if initial %}{{ initial.label }}{% endif %}</span>
  </header>

  <div class="viewer-layers" data-viewer-layers>
    <figure class="viewer-frame" data-viewer-slot="crop">
      <figcaption class="viewer-frame-label">人脸裁剪</figcaption>
      <img data-viewer-layer="crop" alt="人脸裁剪" src="{{ initial.crop_url if initial else '' }}" {% if not initial %}class="is-empty"{% endif %} />
    </figure>
    <figure class="viewer-frame" data-viewer-slot="context">
      <figcaption class="viewer-frame-label">场景定位（带框）</figcaption>
      <img data-viewer-layer="context" alt="场景定位（带框）" src="{{ initial.context_url if initial else '' }}" {% if not initial %}class="is-empty"{% endif %} />
    </figure>
    <figure class="viewer-frame" data-viewer-slot="original">
      <figcaption class="viewer-frame-label">原图</figcaption>
      <img data-viewer-layer="original" alt="原图" src="{{ initial.original_url if initial else '' }}" {% if not initial %}class="is-empty"{% endif %} />
    </figure>
  </div>

  <ul class="viewer-items" hidden>
    {% for item in viewer_items %}
    <li
      data-label="{{ item.label }}"
      data-crop-url="{{ item.crop_url }}"
      data-context-url="{{ item.context_url }}"
      data-original-url="{{ item.original_url }}"
    ></li>
    {% endfor %}
  </ul>
</section>
