{% extends "base.html" %}
{% block content %}
<section>
  <h2>人物库</h2>
  <p class="summary">共 {{ people|length }} 人</p>
  <div class="person-grid">
    {% for person in people %}
    <article class="person-card">
      <h3>{{ person.display_name }}</h3>
      <p>状态：{{ person.status }}</p>
      <p>ID：{{ person.id }}</p>
      <a class="action-link" href="/people/{{ person.id }}">进入维护</a>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
